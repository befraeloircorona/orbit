name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.5.0)"
        required: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Verify the tag matches the version in Cargo.toml ─────────────────────────
  verify:
    name: Verify version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      tag: ${{ steps.ver.outputs.tag }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Extract version
        id: ver
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          echo "tag=${TAG}"     >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Check Cargo.toml matches tag
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          CARGO_VER=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          if [ "v${CARGO_VER}" != "${TAG}" ]; then
            echo "::error::Version mismatch — Cargo.toml has v${CARGO_VER} but tag is ${TAG}"
            exit 1
          fi
          echo "Version verified: ${TAG}"

  # ── Build static binaries for all target platforms ────────────────────────────
  build:
    name: Build — ${{ matrix.artifact }}
    needs: verify
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact: orbit-linux-x86_64
            use_cross: true

          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            artifact: orbit-linux-aarch64
            use_cross: true

          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: orbit-macos-x86_64
            use_cross: false

          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: orbit-macos-aarch64
            use_cross: false

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }} --bin orbit

      - name: Build (native)
        if: "!matrix.use_cross"
        run: cargo build --release --target ${{ matrix.target }} --bin orbit

      - name: Rename binary
        run: |
          cp target/${{ matrix.target }}/release/orbit ${{ matrix.artifact }}
          chmod +x ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  # ── Publish GitHub release ────────────────────────────────────────────────────
  release:
    name: Publish release
    needs: [verify, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create checksums
        run: |
          cd artifacts
          sha256sum orbit-* > checksums.txt
          cat checksums.txt

      - name: Extract release notes from CHANGELOG
        env:
          VERSION: ${{ needs.verify.outputs.version }}
        run: |
          python3 - <<'EOF'
          import re, os
          v = os.environ["VERSION"]
          with open("CHANGELOG.md") as f:
              cl = f.read()
          m = re.search(
              rf"(?m)^## \[{re.escape(v)}\][^\n]*\n(.*?)(?=^## \[|\Z)",
              cl, re.DOTALL
          )
          body = m.group(1).strip() if m else "_No changelog entry found._"
          with open("release_notes.md", "w") as f:
              f.write(body + "\n")
          EOF

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.verify.outputs.tag }}
          body_path: release_notes.md
          files: |
            artifacts/orbit-linux-x86_64
            artifacts/orbit-linux-aarch64
            artifacts/orbit-macos-x86_64
            artifacts/orbit-macos-aarch64
            artifacts/checksums.txt

  # ── Update docs & wiki ────────────────────────────────────────────────────────
  docs:
    name: Update docs & wiki
    needs: [verify, release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v7
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update CHANGELOG footer and README
        env:
          VERSION: ${{ needs.verify.outputs.version }}
          TAG: ${{ needs.verify.outputs.tag }}
          REPO: ${{ github.repository }}
        run: python3 .github/scripts/update_docs.py

      - name: Commit docs updates to main
        env:
          TAG: ${{ needs.verify.outputs.tag }}
        run: |
          git config user.name  "Eloir Corona"
          git config user.email "ecorona@better.com.mx"
          git add CHANGELOG.md README.md
          git diff --cached --quiet || git commit -m "docs: update links for ${TAG}"
          git pull --rebase
          git push

      - name: Update wiki
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.verify.outputs.tag }}
          VERSION: ${{ needs.verify.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.wiki.git" wiki 2>/dev/null || {
            mkdir -p wiki
            git -C wiki init
            git -C wiki remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.wiki.git"
          }

          cp release_notes.md "wiki/Release-${TAG}.md"
          python3 .github/scripts/build_wiki_home.py

          git -C wiki config user.name  "Eloir Corona"
          git -C wiki config user.email "ecorona@better.com.mx"
          git -C wiki add .
          git -C wiki diff --cached --quiet || git -C wiki commit -m "Release ${TAG}"
          git -C wiki push -u origin HEAD:master
