name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build — ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact: orbit-linux-x86_64
            use_cross: true

          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            artifact: orbit-linux-aarch64
            use_cross: true

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }} --bin orbit

      - name: Build (native)
        if: "!matrix.use_cross"
        run: cargo build --release --target ${{ matrix.target }} --bin orbit

      - name: Rename binary
        run: |
          cp target/${{ matrix.target }}/release/orbit ${{ matrix.artifact }}
          chmod +x ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create checksums
        run: |
          cd artifacts
          sha256sum orbit-* > checksums.txt
          cat checksums.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/orbit-linux-x86_64
            artifacts/orbit-linux-aarch64
            artifacts/checksums.txt
          generate_release_notes: true

  docs:
    name: Update docs & wiki
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Update CHANGELOG footer and README
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: python3 .github/scripts/update_docs.py

      - name: Commit docs updates to main
        run: |
          git config user.name  "Eloir Corona"
          git config user.email "eloircoronah@outlook.com"
          git add CHANGELOG.md README.md
          git diff --cached --quiet || git commit -m "docs: update links for ${{ github.ref_name }}"
          git pull --rebase
          git push

      - name: Update wiki
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          VERSION: ${{ steps.ver.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.wiki.git" wiki 2>/dev/null || {
            mkdir -p wiki
            git -C wiki init
            git -C wiki remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.wiki.git"
          }

          cp release_notes.md "wiki/Release-${TAG}.md"
          python3 .github/scripts/build_wiki_home.py

          git -C wiki config user.name  "Eloir Corona"
          git -C wiki config user.email "eloircoronah@outlook.com"
          git -C wiki add .
          git -C wiki diff --cached --quiet || git -C wiki commit -m "Release ${TAG}"
          git -C wiki push -u origin HEAD:master
