name = "jira"
description = "Jira integration — Tasks tab in TUI, context injection, and pre-launch issue summary"
category = "productivity"
url = "https://developer.atlassian.com/cloud/acli/guides/introduction/"

[check]
binary = "acli"

[[install]]
method = "brew"
cmd = ["brew", "tap", "atlassian/homebrew-acli", "&&", "brew", "install", "acli"]
label = "Homebrew (macOS)"

[[install]]
method = "curl"
cmd = ["bash", "-c", "curl -LO https://acli.atlassian.com/linux/latest/acli_linux_amd64/acli && chmod +x acli && sudo install -o root -g root -m 0755 acli /usr/local/bin/acli"]
label = "curl (Linux amd64)"

[auth]
hint = "Atlassian API token: https://id.atlassian.com/manage-profile/security/api-tokens"
cmd = "acli jira auth login"

[tui]
tab_title = "Tasks"
can_be_primary = true
data_cmd = "acli jira workitem search --jql \"assignee = currentUser()\" --json"
data_refresh_secs = 300
scope_key = "jira"

[context]
prompt = "You are working on Jira-managed projects. When referencing tasks, use their Jira keys (e.g., PROJ-123). If an active task is provided in your context, keep it in mind throughout the session."

[pre_launch]
cmd = "acli jira workitem search --jql \"assignee = currentUser()\" --limit 10"
output = "context"
timeout_secs = 5
cache_ttl_secs = 300
